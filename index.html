<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocked-Ege</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #e94560;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            background: #0f3460;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            width: 100%;
            height: auto;
            touch-action: none;
        }
        #scoreboard {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            padding: 10px 30px;
            background: #1a1a2e;
            border-radius: 50px;
            margin: 10px 0;
        }
        #scoreboard span {
            color: #e94560;
        }
        #controls {
            color: #ccc;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        #controls button {
            background: #e94560;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 1rem;
            margin-top: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>⚡ Rocked-Ege ⚡</h1>
        <div id="scoreboard">
            <span id="scorePlayer">0</span> : <span id="scoreEnemy">0</span>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="controls">
            <p>🚗 PC: WASD / Pfeiltasen = fahren | Leertaste = springen/fliegen</p>
            <p>📱 Handy: linke Seite antippen = springen | ziehen zum Lenken</p>
            <button id="resetBtn">Neustart</button>
        </div>
    </div>

    <script>
        // ---------- Canvas & Kontext ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ---------- Spielfeld-Größen ----------
        const FIELD_WIDTH = 800;
        const FIELD_HEIGHT = 400;
        const GOAL_WIDTH = 30;      // Tiefe der Tore
        const GOAL_HEIGHT = 100;     // Höhe der Tore
        const WALL_SIZE = 20;        // Dicke der Wände

        // ---------- Punktestand ----------
        let playerScore = 0;
        let enemyScore = 0;
        const scorePlayerEl = document.getElementById('scorePlayer');
        const scoreEnemyEl = document.getElementById('scoreEnemy');

        // ---------- Spieler-Auto ----------
        const player = {
            x: 200, y: 200,
            angle: 0,
            speed: 0,
            maxSpeed: 3,
            accel: 0.2,
            turnSpeed: 0.05,
            width: 25,
            height: 15,
            isBoosting: false,
            boostEndTime: 0,
            canJump: true,
            inAir: false,
            vx: 0, vy: 0
        };

        // ---------- Gegner-Auto (KI) ----------
        const enemy = {
            x: 600, y: 200,
            angle: Math.PI,
            speed: 0,
            maxSpeed: 2.5,
            accel: 0.15,
            turnSpeed: 0.03,
            width: 25,
            height: 15,
            isBoosting: false,
            boostEndTime: 0,
            canJump: true,
            inAir: false,
            vx: 0, vy: 0
        };

        // ---------- Ball ----------
        const ball = {
            x: 400, y: 200,
            radius: 12,
            vx: 0, vy: 0,
            friction: 0.98
        };

        // ---------- Boost-Felder ----------
        const boosts = [
            { x: 200, y: 100, active: true, radius: 15, respawnTime: 0 },
            { x: 600, y: 300, active: true, radius: 15, respawnTime: 0 },
            { x: 400, y: 200, active: true, radius: 15, respawnTime: 0 }
        ];

        // ---------- Tastaturzustand ----------
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, a: false, s: false, d: false,
            space: false
        };

        // ---------- Touch-Steuerung ----------
        let touchStartX = 0, touchStartY = 0;
        let touchMoveX = 0, touchMoveY = 0;
        let isTouching = false;

        // ---------- Event-Listener ----------
        window.addEventListener('keydown', (e) => {
            e.preventDefault();
            const key = e.key;
            if (key === 'ArrowUp') keys.ArrowUp = true;
            if (key === 'ArrowDown') keys.ArrowDown = true;
            if (key === 'ArrowLeft') keys.ArrowLeft = true;
            if (key === 'ArrowRight') keys.ArrowRight = true;
            if (key === 'w' || key === 'W') keys.w = true;
            if (key === 'a' || key === 'A') keys.a = true;
            if (key === 's' || key === 'S') keys.s = true;
            if (key === 'd' || key === 'D') keys.d = true;
            if (key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key;
            if (key === 'ArrowUp') keys.ArrowUp = false;
            if (key === 'ArrowDown') keys.ArrowDown = false;
            if (key === 'ArrowLeft') keys.ArrowLeft = false;
            if (key === 'ArrowRight') keys.ArrowRight = false;
            if (key === 'w' || key === 'W') keys.w = false;
            if (key === 'a' || key === 'A') keys.a = false;
            if (key === 's' || key === 'S') keys.s = false;
            if (key === 'd' || key === 'D') keys.d = false;
            if (key === ' ') keys.space = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            touchStartX = (touch.clientX - rect.left) * scaleX;
            touchStartY = (touch.clientY - rect.top) * scaleY;
            touchMoveX = touchStartX;
            touchMoveY = touchStartY;
            isTouching = true;

            // Linke Bildschirmhälfte = springen
            if (touchStartX < canvas.width / 2) {
                if (!player.inAir && player.canJump) {
                    player.inAir = true;
                    player.canJump = false;
                    player.vx = Math.cos(player.angle) * 5;
                    player.vy = Math.sin(player.angle) * 5;
                    player.vy -= 2;
                }
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            touchMoveX = (touch.clientX - rect.left) * scaleX;
            touchMoveY = (touch.clientY - rect.top) * scaleY;

            const dx = touchMoveX - touchStartX;
            if (Math.abs(dx) > 20) {
                if (dx > 0) player.angle += 0.05;
                else player.angle -= 0.05;
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isTouching = false;
        });

        document.getElementById('resetBtn').addEventListener('click', resetGame);

        function resetGame() {
            playerScore = 0;
            enemyScore = 0;
            updateScore();
            resetPositions();
        }

        function resetPositions() {
            player.x = 200; player.y = 200; player.angle = 0; player.speed = 0; player.vx = 0; player.vy = 0; player.inAir = false; player.canJump = true;
            enemy.x = 600; enemy.y = 200; enemy.angle = Math.PI; enemy.speed = 0; enemy.vx = 0; enemy.vy = 0; enemy.inAir = false; enemy.canJump = true;
            ball.x = 400; ball.y = 200; ball.vx = 0; ball.vy = 0;
        }

        function updateScore() {
            scorePlayerEl.textContent = playerScore;
            scoreEnemyEl.textContent = enemyScore;
        }

        function handleBallCollision(car, ball) {
            let dx = ball.x - car.x;
            let dy = ball.y - car.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            let minDist = car.width/2 + ball.radius;

            if (dist < minDist) {
                let angle = car.angle;
                let power = 5 + Math.abs(car.speed) * 2;
                ball.vx += Math.cos(angle) * power;
                ball.vy += Math.sin(angle) * power;

                let overlap = minDist - dist;
                let pushX = dx / dist * overlap * 0.5;
                let pushY = dy / dist * overlap * 0.5;
                car.x -= pushX;
                car.y -= pushY;
                ball.x += pushX;
                ball.y += pushY;
            }
        }

        function checkGoal() {
            // Linkes Tor (Spielertor)
            if (ball.x - ball.radius < GOAL_WIDTH && 
                ball.y > (FIELD_HEIGHT/2 - GOAL_HEIGHT/2) && 
                ball.y < (FIELD_HEIGHT/2 + GOAL_HEIGHT/2)) {
                enemyScore++;
                updateScore();
                resetPositions();
                return;
            }

            // Rechtes Tor (Gegnertor)
            if (ball.x + ball.radius > FIELD_WIDTH - GOAL_WIDTH && 
                ball.y > (FIELD_HEIGHT/2 - GOAL_HEIGHT/2) && 
                ball.y < (FIELD_HEIGHT/2 + GOAL_HEIGHT/2)) {
                playerScore++;
                updateScore();
                resetPositions();
                return;
            }
        }

        function collectBoosts(car) {
            for (let b of boosts) {
                if (!b.active) continue;
                let dx = car.x - b.x;
                let dy = car.y - b.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < car.width/2 + b.radius) {
                    b.active = false;
                    b.respawnTime = 300;
                    car.isBoosting = true;
                    car.boostEndTime = 60;
                }
            }
        }

        function updateEnemy() {
            if (enemy.inAir) {
                enemy.x += enemy.vx;
                enemy.y += enemy.vy;
                enemy.vx *= 0.98;
                enemy.vy *= 0.98;
                if (enemy.boostEndTime <= 0) {
                    enemy.inAir = false;
                    enemy.canJump = true;
                }
            } else {
                let dx = ball.x - enemy.x;
                let dy = ball.y - enemy.y;
                let targetAngle = Math.atan2(dy, dx);
                let angleDiff = targetAngle - enemy.angle;
                while (angleDiff > Math.PI) angleDiff -= 2*Math.PI;
                while (angleDiff < -Math.PI) angleDiff += 2*Math.PI;
                enemy.angle += Math.sign(angleDiff) * Math.min(Math.abs(angleDiff), enemy.turnSpeed);

                enemy.speed += enemy.accel;
                if (enemy.speed > enemy.maxSpeed) enemy.speed = enemy.maxSpeed;

                enemy.x += Math.cos(enemy.angle) * enemy.speed;
                enemy.y += Math.sin(enemy.angle) * enemy.speed;

                let distToBall = Math.hypot(ball.x - enemy.x, ball.y - enemy.y);
                if (distToBall < 60 && enemy.canJump) {
                    enemy.inAir = true;
                    enemy.canJump = false;
                    enemy.vx = Math.cos(enemy.angle) * 5;
                    enemy.vy = Math.sin(enemy.angle) * 5;
                    enemy.boostEndTime = 30;
                }
            }

            if (enemy.isBoosting) {
                enemy.boostEndTime--;
                if (enemy.boostEndTime <= 0) enemy.isBoosting = false;
            }
            enemy.maxSpeed = enemy.isBoosting ? 4 : 2.5;

            enemy.x = Math.max(WALL_SIZE + enemy.width/2, Math.min(FIELD_WIDTH - WALL_SIZE - enemy.width/2, enemy.x));
            enemy.y = Math.max(WALL_SIZE + enemy.height/2, Math.min(FIELD_HEIGHT - WALL_SIZE - enemy.height/2, enemy.y));

            collectBoosts(enemy);
        }

        function updatePlayer() {
            let moveX = 0, moveY = 0;
            if (keys.ArrowUp || keys.w) moveY -= 1;
            if (keys.ArrowDown || keys.s) moveY += 1;
            if (keys.ArrowLeft || keys.a) moveX -= 1;
            if (keys.ArrowRight || keys.d) moveX += 1;

            if (moveX !== 0) {
                player.angle += moveX * player.turnSpeed;
            }

            if (moveY !== 0) {
                player.speed += moveY * player.accel;
                if (player.speed > player.maxSpeed) player.speed = player.maxSpeed;
                if (player.speed < -player.maxSpeed/2) player.speed = -player.maxSpeed/2;
            } else {
                player.speed *= 0.95;
            }

            if (!player.inAir) {
                player.x += Math.cos(player.angle) * player.speed;
                player.y += Math.sin(player.angle) * player.speed;
            } else {
                player.x += player.vx;
                player.y += player.vy;
                player.vx *= 0.98;
                player.vy *= 0.98;
                if (Math.abs(player.vx) < 0.1 && Math.abs(player.vy) < 0.1) {
                    player.inAir = false;
                    player.canJump = true;
                }
            }

            if (keys.space && !player.inAir && player.canJump) {
                player.inAir = true;
                player.canJump = false;
                player.vx = Math.cos(player.angle) * 5;
                player.vy = Math.sin(player.angle) * 5;
                player.vy -= 2;
            }

            if (player.isBoosting) {
                player.boostEndTime--;
                if (player.boostEndTime <= 0) player.isBoosting = false;
            }
            player.maxSpeed = player.isBoosting ? 4 : 3;

            player.x = Math.max(WALL_SIZE + player.width/2, Math.min(FIELD_WIDTH - WALL_SIZE - player.width/2, player.x));
            player.y = Math.max(WALL_SIZE + player.height/2, Math.min(FIELD_HEIGHT - WALL_SIZE - player.height/2, player.y));

            collectBoosts(player);
        }

        function updateBall() {
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.vx *= ball.friction;
            ball.vy *= ball.friction;

            if (ball.x - ball.radius < WALL_SIZE) {
                ball.x = WALL_SIZE + ball.radius;
                ball.vx *= -0.8;
            }
            if (ball.x + ball.radius > FIELD_WIDTH - WALL_SIZE) {
                ball.x = FIELD_WIDTH - WALL_SIZE - ball.radius;
                ball.vx *= -0.8;
            }
            if (ball.y - ball.radius < WALL_SIZE) {
                ball.y = WALL_SIZE + ball.radius;
                ball.vy *= -0.8;
            }
            if (ball.y + ball.radius > FIELD_HEIGHT - WALL_SIZE) {
                ball.y = FIELD_HEIGHT - WALL_SIZE - ball.radius;
                ball.vy *= -0.8;
            }
        }

        function updateBoosts() {
            for (let b of boosts) {
                if (!b.active) {
                    b.respawnTime--;
                    if (b.respawnTime <= 0) {
                        b.active = true;
                    }
                }
            }
        }

        function handleCarCollision() {
            let dx = enemy.x - player.x;
            let dy = enemy.y - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            let minDist = (player.width + enemy.width) / 2;
            if (dist < minDist) {
                let angle = Math.atan2(dy, dx);
                let overlap = minDist - dist;
                let pushX = Math.cos(angle) * overlap * 0.5;
                let pushY = Math.sin(angle) * overlap * 0.5;
                player.x -= pushX;
                player.y -= pushY;
                enemy.x += pushX;
                enemy.y += pushY;

                let vRel = (player.speed - enemy.speed) * 0.5;
                player.speed += vRel;
                enemy.speed -= vRel;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, FIELD_WIDTH, FIELD_HEIGHT);

            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, FIELD_WIDTH, FIELD_HEIGHT);

            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 15]);
            ctx.beginPath();
            ctx.moveTo(FIELD_WIDTH/2, 0);
            ctx.lineTo(FIELD_WIDTH/2, FIELD_HEIGHT);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#e94560';
            ctx.globalAlpha = 0.3;
            ctx.fillRect(0, FIELD_HEIGHT/2 - GOAL_HEIGHT/2, GOAL_WIDTH, GOAL_HEIGHT);
            ctx.fillRect(FIELD_WIDTH - GOAL_WIDTH, FIELD_HEIGHT/2 - GOAL_HEIGHT/2, GOAL_WIDTH, GOAL_HEIGHT);
            ctx.globalAlpha = 1;

            for (let b of boosts) {
                if (b.active) {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                    ctx.fillStyle = '#00ffcc';
                    ctx.shadowColor = '#00ffcc';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
            ctx.fillStyle = '#f9c74f';
            ctx.shadowColor = '#f9c74f';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#4361ee';
            ctx.shadowColor = '#4361ee';
            ctx.shadowBlur = 10;
            ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
            ctx.restore();

            ctx.save();
            ctx.translate(enemy.x, enemy.y);
            ctx.rotate(enemy.angle);
            ctx.fillStyle = '#e94560';
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 10;
            ctx.fillRect(-enemy.width/2, -enemy.height/2, enemy.width, enemy.height);
            ctx.restore();

            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            updatePlayer();
            updateEnemy();
            updateBall();
            handleBallCollision(player, ball);
            handleBallCollision(enemy, ball);
            handleCarCollision();
            checkGoal();
            updateBoosts();

            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
